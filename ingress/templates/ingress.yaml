{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: path-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - http:
      paths:
      - path: /
        backend:
          service:
            name: client-service
            port:
              number: 3000
        pathType: ImplementationSpecific
      {{- range .Values.services }}
      - path: /{{ .path }}(/|$)(.*)
        backend:
          service:
            name: {{ .serviceName }}
            port:
              number: {{ .servicePort }}
        pathType: ImplementationSpecific
      {{- end }}
{{- end }}
