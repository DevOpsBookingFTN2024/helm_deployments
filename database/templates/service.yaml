{{- if .Values.database.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "database.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "database.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "database.labels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.database.port }}
      targetPort: {{ .Values.database.port }}
  type: ClusterIP
{{- end }}