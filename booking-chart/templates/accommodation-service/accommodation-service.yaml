apiVersion: v1
kind: Service
metadata:
  name: {{.Values.accommodation.service.name}}
  namespace: {{.Values.namespace}}
  labels:
    app: {{.Values.accommodation.deployment.name}}
    # app.kubernetes.io/managed-by: Helm
spec:
  ports:
    - protocol: TCP
      name: http
      port: {{.Values.accommodation.service.port}}
      targetPort: {{.Values.accommodation.service.port}}
  # {{- if .Values.accommodation.metrics.enabled }}
  #   - protocol: TCP
  #     name: metrics
  #     port: {{ .Values.accommodation.metrics.port }}
  #     targetPort: {{ .Values.accommodation.metrics.port }}
  # {{- end }}
  type: ClusterIP
  selector:
    app: {{.Values.accommodation.deployment.name}}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Values.accommodation.deployment.name}}
  namespace: {{.Values.namespace}}
spec:
  replicas: {{.Values.accommodation.deployment.replicaCount | default 1}}
  selector:
    matchLabels:
      app: {{.Values.accommodation.deployment.name}}
  template:
    metadata:
      labels:
        app: {{.Values.accommodation.deployment.name}}
    spec:
      containers:
        - name: accommodation-service
          image: "{{ .Values.accommodation.deployment.image.repository }}:{{ .Values.accommodation.deployment.image.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{.Values.accommodation.deployment.containerPort | int}}
            # {{- if .Values.accommodation.metrics.enabled }}
            # - name : metrics
            #   containerPort: {{ .Values.accommodation.metrics.port }}
            # {{- end }}
          # resources:
          #   limits:
          #     memory: "512Mi"
          #     cpu: "500m"
          #   requests:
          #     memory: "256Mi"
          #     cpu: "250m"
          env:
            - name: SPRING_DATASOURCE_URL
              value: {{.Values.accommodation.env.datasourceUrl}}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{.Values.accommodation.env.datasourceUsername}}
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{.Values.accommodation.env.datasourcePassword}}
            - name: USER_SERVICE_URL
              value: {{.Values.accommodation.env.userServiceUrl}}
            - name: RESERVATION_SERVICE_URL
              value: {{.Values.accommodation.env.reservationServiceUrl}}
            - name: RATING_SERVICE_URL
              value: {{.Values.accommodation.env.ratingServiceUrl}}
          livenessProbe:
            httpGet:
              path: {{.Values.accommodation.deployment.probes.liveness.path | default "/actuator/health/liveness"}}
              port: {{.Values.accommodation.deployment.containerPort}}
            initialDelaySeconds: {{.Values.accommodation.deployment.probes.liveness.initialDelaySeconds | default 30}}
          periodSeconds: {{.Values.accommodation.deployment.probes.liveness.periodSeconds | default 10}}

          readinessProbe:
            httpGet:
              path: {{.Values.accommodation.deployment.probes.readiness.path | default "/actuator/health/readiness"}}
              port: {{.Values.accommodation.deployment.containerPort}}
            initialDelaySeconds: {{.Values.accommodation.deployment.probes.readiness.initialDelaySeconds | default 15}}
            periodSeconds: {{.Values.accommodation.deployment.probes.readiness.periodSeconds | default 5}}
      imagePullSecrets:
        - name: {{.Values.accommodation.deployment.imagePullSecret}}
