namespace: "booking"

service:
  fullname: client-service
  type: NodePort
  port: 80
  nodePort: 30081
  selectorLabels:
    app: client

deployment:
  name: client
  replicaCount: 1
  image:
    repository: ghcr.io/devopsbookingftn2024/fe/app
    # repository: fe-for-helm
    tag: latest
  imagePullSecret: github-container-registry
  # imagePullSecret: ""
  containerPort: 80

# ConfigMap data
configmap:
  data:
    VITE_USER_API_URL: /user-service/
    VITE_ACCOMMODATIONS_API_URL: /accommodation-service/
    VITE_RESERVATION_API_URL: /reservation-service/
    VITE_RATING_API_URL: /rating-service/
    VITE_NOTIFICATION_API_URL: /notification-service/
    VITE_APP_NAME: Booking
    VITE_STANDARD_FIELD_MAX_LENGTH: "100"
    VITE_LONGER_FIELD_MAX_LENGTH: "300"
    VITE_MAX_FILE_SIZE: "5000000"